<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>EchoDupe | HallowEcho</title>
    <style>
        :root { --neon: #06b6d4; --blood: #880000; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* MEGA LOADER */
        #boot-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .scanline { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(6, 182, 212, 0.1); z-index: 10001; pointer-events: none; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        
        .loading-bar { width: 400px; height: 4px; background: #111; border: 1px solid #333; overflow: hidden; }
        #fill { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 15px var(--neon); }
        
        /* BUTTONS */
        .init-btn {
            display: none; padding: 20px 60px; background: transparent; 
            border: 1px solid var(--neon); color: var(--neon); cursor: pointer;
            font-family: inherit; font-size: 18px; text-transform: uppercase; margin-top: 30px;
        }
        .init-btn:hover { background: rgba(6, 182, 212, 0.1); box-shadow: 0 0 20px var(--neon); }

        /* HUD */
        #hud { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
        #vignette { position: absolute; inset: 0; background: radial-gradient(circle, transparent 30%, black 150%); }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 6px; height: 6px; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; }

        /* SETTINGS */
        #pause-menu {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 100000; align-items: center; justify-content: center;
        }
        .menu-box { border: 1px solid var(--neon); padding: 50px; background: #050505; text-align: center; }
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
    </style>
</head>
<body>

    <div class="scanline"></div>
    
    <div id="boot-screen">
        <h1 style="color: var(--neon); letter-spacing: 10px;">HALLOWECHO</h1>
        <div class="loading-bar"><div id="fill"></div></div>
        <div id="status" style="margin-top: 10px; color: #555;">DOWNLOADING_CORE_FILES...</div>
        <button id="start-btn" class="init-btn" onclick="masterInit()">START_SYSTEM</button>
        <a href="index.html" style="color: #444; text-decoration: none; margin-top: 20px;">[ EXIT_TO_HUB ]</a>
    </div>

    <div id="pause-menu">
        <div class="menu-box">
            <h2 style="color: var(--neon); margin-top: 0;">PAUSED</h2>
            <p>BRIGHTNESS</p>
            <input type="range" id="bright-slider" min="50" max="350" value="100" style="width: 250px; accent-color: var(--neon);">
            <br><br>
            <button class="init-btn" style="display:inline-block" onclick="togglePause()">RESUME</button>
            <br>
            <a href="index.html" class="init-btn" style="display:inline-block; border-color: var(--blood); color: var(--blood); margin-top: 10px;">TERMINATE_SESSION</a>
        </div>
    </div>

    <div id="hud">
        <div id="vignette"></div>
        <div id="crosshair"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="map.js"></script>
    <script src="main.js"></script>

    <script>
        let isPaused = false;
        const canvas = document.getElementById('gameCanvas');

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-menu').style.display = isPaused ? 'flex' : 'none';
            if (isPaused) document.exitPointerLock();
            else canvas.requestPointerLock();
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyP' || e.code === 'Escape') togglePause();
        });

        canvas.addEventListener('click', () => {
            if (!isPaused && document.getElementById('boot-screen').style.display === 'none') {
                canvas.requestPointerLock();
            }
        });

        function masterInit() {
            // Start Audio Context (Browsers require a click)
            if (window.AudioContext || window.webkitAudioContext) {
                window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            document.getElementById('boot-screen').style.display = 'none';
            if (window.runEngine) window.runEngine();
        }
    </script>
</body>
</html>
