<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>EchoDupe | HallowEcho</title>
    <style>
        :root { --neon: #06b6d4; --bg: #050505; --error: #ff0055; }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
        
        /* THE BULLETPROOF LOADER */
        #boot-screen {
            position: fixed; inset: 0; background: black; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .load-box { width: 400px; height: 10px; border: 2px solid #333; position: relative; margin: 20px 0; }
        #load-fill { width: 0%; height: 100%; background: var(--neon); transition: width 0.2s; }
        
        #status-text { font-size: 14px; color: var(--neon); letter-spacing: 2px; text-transform: uppercase; }
        #error-log { color: var(--error); font-size: 12px; margin-top: 10px; max-height: 100px; overflow-y: auto; text-align: center; }

        /* BUTTONS */
        .btn {
            display: none; padding: 15px 40px; margin: 10px;
            background: transparent; border: 2px solid var(--neon); color: var(--neon);
            cursor: pointer; font-weight: bold; font-family: inherit; font-size: 16px;
            text-decoration: none; text-align: center;
        }
        .btn:hover { background: var(--neon); color: black; }
        #force-btn { border-color: var(--error); color: var(--error); }
        #force-btn:hover { background: var(--error); color: white; }

        /* SETTINGS */
        #pause-menu {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 50000; align-items: center; justify-content: center;
        }
        .menu-card { border: 1px solid var(--neon); padding: 40px; background: #111; width: 300px; text-align: center; }
        
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 6px; height: 6px; background: white; border-radius: 50%; pointer-events: none; mix-blend-mode: difference; z-index: 100;}
    </style>
</head>
<body>

    <div id="boot-screen">
        <h1 style="margin:0; color:var(--neon); letter-spacing: 5px;">HALLOWECHO</h1>
        <div class="load-box"><div id="load-fill"></div></div>
        <div id="status-text">INITIALIZING...</div>
        <div id="error-log"></div>
        
        <button id="start-btn" class="btn" onclick="launchGame()">START_SYSTEM</button>
        <button id="force-btn" class="btn" onclick="launchGame()">FORCE_START (IGNORE ERRORS)</button>
        <a href="index.html" class="btn" style="display:block; border: none; font-size: 12px; color: #666;">[ BACK_TO_HUB ]</a>
    </div>

    <div id="pause-menu">
        <div class="menu-card">
            <h2 style="color:var(--neon); margin-top:0;">PAUSED</h2>
            <p>BRIGHTNESS</p>
            <input type="range" id="b-slide" min="50" max="400" value="100" style="width:100%; accent-color:var(--neon);">
            <p>SENSITIVITY</p>
            <input type="range" id="s-slide" min="1" max="25" value="10" style="width:100%; accent-color:var(--neon);">
            <br><br>
            <button class="btn" style="display:inline-block;" onclick="togglePause()">RESUME</button>
        </div>
    </div>

    <div id="crosshair"></div>
    <canvas id="gameCanvas"></canvas>

    <script src="map.js"></script>
    <script src="main.js"></script>

    <script>
        let isPaused = false;
        let gameRunning = false;
        const cvs = document.getElementById('gameCanvas');

        // FAILSAFE: If the game is stuck for 5 seconds, show the force start button.
        setTimeout(() => {
            if(!gameRunning) document.getElementById('force-btn').style.display = 'inline-block';
        }, 5000);

        function togglePause() {
            if(!gameRunning) return;
            isPaused = !isPaused;
            document.getElementById('pause-menu').style.display = isPaused ? 'flex' : 'none';
            if (isPaused) document.exitPointerLock();
            else cvs.requestPointerLock();
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyP' || e.code === 'Escape') togglePause();
        });

        cvs.addEventListener('click', () => {
            if (gameRunning && !isPaused) cvs.requestPointerLock();
        });

        function launchGame() {
            gameRunning = true;
            document.getElementById('boot-screen').style.display = 'none';
            if(window.runEngine) window.runEngine();
        }
    </script>
</body>
</html>
