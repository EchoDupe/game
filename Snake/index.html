<!doctype html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <title>EchoDupe | Neon Snake</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/title.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="scanline"></div>

    <div class="wrapper">
        <div class="game-details">
            <div class="flex flex-col">
                <span class="text-[9px] text-zinc-600 tracking-[0.3em] font-black">STATUS: ACTIVE</span>
                <span class="score text-cyan-500 font-black italic text-xl">SCORE: 0</span>
            </div>
            <div class="flex flex-col text-right">
                <span class="text-[9px] text-zinc-600 tracking-[0.3em] font-black">HIGHSCORE_DB</span>
                <span class="high-score text-white font-black italic text-xl">BEST: 0</span>
            </div>
        </div>
        
        <div class="play-board"></div>
        
        <div class="controls">
            <i data-key="w" class="fa-solid fa-chevron-up"></i>
            <div class="flex gap-4">
                <i data-key="a" class="fa-solid fa-chevron-left"></i>
                <i data-key="s" class="fa-solid fa-chevron-down"></i>
                <i data-key="d" class="fa-solid fa-chevron-right"></i>
            </div>
        </div>

        <div class="footer-actions">
            <button class="reset-btn" onclick="resetData()">Wipe_Memory</button>
            <a href="../index.html" class="back-logo-link">
                <img src="../assets/title.png" alt="EchoDupe Home">
            </a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function resetData() {
            if(confirm("Delete local highscore data?")) {
                localStorage.removeItem("snake-high-score");
                location.reload();
            }
        }
    </script>
</body>
</html>
