<html>
  <head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex,nofollow" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>EchoDupe | Tunnel Rush</title>
    <link rel="stylesheet" href="style/style.css">
    <script src="UnityLoader.js"></script>
    <script src="UnityProgress.js"></script>
    <link rel="icon" href="img/tunnel.jpg">
    
    <style>
        /* Forces game to fill the screen and removes scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        .webgl-content {
            width: 100% !important;
            height: 100% !important;
        }
        #gameContainer {
            width: 100% !important;
            height: 100% !important;
        }

        /* HUB BUTTON STYLES */
        #return-terminal {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2147483647 !important;
            background: #000;
            border: 2px solid #06b6d4;
            color: #06b6d4;
            padding: 12px 20px;
            font-family: sans-serif;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer !important;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
            user-select: none;
            transition: all 0.2s;
        }
        #return-terminal:hover {
            background: #06b6d4;
            color: #000;
        }
    </style>

    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "build.json", {
          onProgress: UnityProgress,
          Module:{
              onRuntimeInitialized: function() {
                  UnityProgress(gameInstance, "complete")
              }
          }
      });
    </script>
  </head>
  <body>

    <button id="return-terminal">
        ← EXIT_TO_HUB
    </button>

    <div class="webgl-content">
      <div id="gameContainer"></div>
    </div>

    <script type="text/javascript">
        // GLOBAL REDIRECT & TITLE LOCK SCRIPT
        document.addEventListener('DOMContentLoaded', function() {
            // 1. Handle the Hub Button
            var btn = document.getElementById('return-terminal');
            if (btn) {
                btn.addEventListener('click', function(e) {
                    window.location.replace("https://echodupe.github.io/Games/");
                });
            }

            // 2. Force Branding in the Title
            var targetTitle = "EchoDupe | Tunnel Rush";
            if (document.title !== targetTitle) {
                document.title = targetTitle;
            }

            // Watch for changes (prevents Unity from renaming the tab)
            var observer = new MutationObserver(function() {
                if (document.title !== targetTitle) {
                    document.title = targetTitle;
                }
            });
            observer.observe(document.querySelector('title'), { childList: true });
        });
    </script>
  </body>
</html>
