<html>
  <head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex,nofollow" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>EchoDupe | Tunnel Rush</title>
    <link rel="stylesheet" href="style/style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    
    <script src="UnityLoader.js"></script>
    <script src="UnityProgress.js"></script>
    <link rel="icon" type="image/png" href="assets/title.png">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        .webgl-content {
            width: 100% !important;
            height: 100% !important;
        }
        #gameContainer {
            width: 100% !important;
            height: 100% !important;
        }

        /* BACK TO HUB - KEPT TOP LEFT */
        .back-to-hub {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2147483647 !important;
            background: rgba(15, 15, 20, 0.8);
            border: 1px solid rgba(6, 182, 212, 0.5);
            color: #06b6d4;
            padding: 10px 18px;
            border-radius: 12px;
            font-family: 'Helvetica', Arial, sans-serif;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer !important;
        }
        .back-to-hub:hover {
            background: #06b6d4;
            color: #000;
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.6);
            transform: translateY(-2px);
        }
    </style>

    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "build.json", {
          onProgress: UnityProgress,
          Module:{
              onRuntimeInitialized: function() {
                  UnityProgress(gameInstance, "complete")
              }
          }
      });
    </script>
  </head>
  <body>

    <a href="https://echodupe.github.io/Games/" class="back-to-hub">
        <i class="fa-solid fa-house"></i>
        <span>Back to Hub</span>
    </a>

    <div class="webgl-content">
      <div id="gameContainer"></div>
    </div>

    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', function() {
            var targetTitle = "EchoDupe | Tunnel Rush";
            if (document.title !== targetTitle) {
                document.title = targetTitle;
            }
            var observer = new MutationObserver(function() {
                if (document.title !== targetTitle) {
                    document.title = targetTitle;
                }
            });
            observer.observe(document.querySelector('title'), { childList: true });
        });
    </script>
  </body>
</html>
