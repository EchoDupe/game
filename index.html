<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoDupe | Games</title>
    <link rel="icon" type="image/png" href="assets/title.png">
    
    <style>
        :root { --neon: #00ffff; --bg: #000a0a; --dark-gray: #555555; --card-bg: rgba(0, 15, 15, 0.8); }
        
        body { 
            background: var(--bg); color: var(--neon); 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 60px 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* Scanline Effect */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 200; background-size: 100% 4px; pointer-events: none;
        }

        #header { text-align: center; margin-bottom: 70px; z-index: 10; }
        #title-img { 
            width: 100%; max-width: 550px; height: auto; 
            filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.4));
        }
        .header-subtitle { 
            font-size: 1.8em; letter-spacing: 15px; margin-top: 20px; 
            font-weight: bold; text-shadow: 0 0 12px var(--neon);
        }

        #game-grid {
            display: flex; justify-content: center; width: 100%; max-width: 1100px; z-index: 10;
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid #004444;
            padding: 60px 80px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .game-card:hover {
            border-color: var(--neon);
            background: rgba(0, 255, 255, 0.08);
            transform: scale(1.05);
            box-shadow: 0 10px 40px rgba(0, 255, 255, 0.3);
        }

        .game-card h3 { margin: 0; font-size: 2em; letter-spacing: 6px; font-weight: 900; }
        .game-card .ver-tag { font-size: 0.9em; color: var(--dark-gray); margin-top: 15px; display: block; letter-spacing: 3px; }

        .footer { margin-top: auto; padding: 60px 0 20px 0; font-size: 0.85em; letter-spacing: 2px; z-index: 10; }
        .footer b { color: var(--neon); }

        /* Loading Screen */
        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 300; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #bar-container { width: 250px; height: 2px; border: 1px solid #003333; margin-top: 25px; }
        #bar { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

<div id="loader">
    <div style="font-size: 0.9em; letter-spacing: 6px; opacity: 0.8; font-weight: bold;">CONNECTING_TO_SIMULATION</div>
    <div id="bar-container"><div id="bar"></div></div>
</div>

<div id="header">
    <img src="assets/title.png" id="title-img" alt="ECHODUPE">
    <div class="header-subtitle">GAMES</div>
</div>

<div id="game-grid">
    <div class="game-card" onclick="boot('Games/TreeSimulator.html')">
        <h3>TREE</h3>
        <span class="ver-tag">SIMULATOR_ENV</span>
    </div>
</div>

<div class="footer">
    <span>DEVELOPED AND DESIGNED BY </span><b>SKITXOE</b>
</div>

<script>
    function boot(url) {
        document.getElementById('loader').style.display = 'flex';
        let width = 0;
        const bar = document.getElementById('bar');
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                window.location.href = url;
            } else {
                width += Math.random() * 35; // Fast, digital feel
                bar.style.width = Math.min(width, 100) + '%';
            }
        }, 100);
    }
</script>

</body>
</html>
