<!DOCTYPE html>
<html>
<head>
    <title>EchoDupe | Games</title>
    <link rel="icon" type="image/png" href="assets/title.png">
    
    <style>
        :root { --neon: #00ffff; --bg: #000a0a; --dark-gray: #555555; }
        
        body { 
            background: var(--bg); color: var(--neon); 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* Static Scanlines */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 200; background-size: 100% 4px; pointer-events: none;
        }

        #header { text-align: center; margin-bottom: 60px; z-index: 10; }
        #title-img { 
            width: 100%; max-width: 500px; height: auto; 
            filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.3));
        }
        .header-subtitle { 
            font-size: 1.5em; letter-spacing: 12px; margin-top: 15px; 
            font-weight: bold; text-shadow: 0 0 10px var(--neon);
        }

        #game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px; width: 100%; max-width: 1000px; z-index: 10;
        }

        .game-card {
            background: rgba(0, 15, 15, 0.8);
            border: 1px solid #004444;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .game-card:hover {
            border-color: var(--neon);
            background: rgba(0, 255, 255, 0.05);
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .game-card h3 { margin: 0; font-size: 1.2em; letter-spacing: 3px; }
        .game-card .ver-tag { font-size: 0.7em; color: var(--dark-gray); margin-top: 8px; display: block; }

        .footer { margin-top: auto; padding-top: 60px; font-size: 0.85em; letter-spacing: 1px; z-index: 10; }
        .footer span { color: var(--dark-gray); }
        .footer b { color: var(--neon); }

        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 300; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #bar-container { width: 200px; height: 2px; border: 1px solid #003333; margin-top: 20px; }
        #bar { width: 0%; height: 100%; background: var(--neon); }
    </style>
</head>
<body>

<div id="loader">
    <div style="font-size: 0.8em; letter-spacing: 5px; opacity: 0.7;">LOADING SIMULATION...</div>
    <div id="bar-container"><div id="bar"></div></div>
</div>

<div id="header">
    <img src="assets/title.png" id="title-img" alt="ECHODUPE">
    <div class="header-subtitle">GAMES</div>
</div>

<div id="game-grid">
    <div class="game-card" onclick="boot('games/TreeSimulator.html')">
        <h3>TREE</h3>
        <span class="ver-tag">SIMULATOR</span>
    </div>

    <div class="game-card" onclick="boot('v6-5/index.html')">
        <h3>SIMULATION</h3>
        <span class="ver-tag">VERSION 6.5</span>
    </div>

    <div class="game-card" onclick="boot('v6-4/index.html')">
        <h3>LEGACY</h3>
        <span class="ver-tag">VERSION 6.4</span>
    </div>
</div>

<div class="footer">
    <span>DEVELOPED AND DESIGNED BY </span><b>SKITXOE</b>
</div>

<script>
    function boot(url) {
        document.getElementById('loader').style.display = 'flex';
        let width = 0;
        const bar = document.getElementById('bar');
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                window.location.href = url;
            } else {
                width += Math.random() * 40;
                bar.style.width = Math.min(width, 100) + '%';
            }
        }, 80);
    }
</script>

</body>
</html>
