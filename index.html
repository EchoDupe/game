<!DOCTYPE html>
<html>
<head>
    <title>EchoDupe Tycoon v3</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; opacity: 0.5;
        }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: white; background: rgba(0,0,0,0.8);
            padding: 15px; border-radius: 10px; border-left: 5px solid #ffcc00;
        }
        #shop-gui {
            display: none; /* Hidden by default */
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            width: 300px; background: #222; color: white;
            padding: 20px; border-radius: 15px; border: 3px solid #3399ff;
            text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .btn {
            background: #3399ff; color: white; border: none;
            padding: 10px; width: 100%; margin-top: 10px;
            cursor: pointer; border-radius: 5px; font-weight: bold;
        }
        .btn:hover { background: #55aaff; }
        .btn:disabled { background: #444; color: #888; }
        #close-btn { margin-top: 15px; background: #ff4444; font-size: 12px; width: 50%; }
        #msg { position: absolute; bottom: 20%; width: 100%; text-align: center; color: white; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>

<div id="crosshair"></div>
<div id="msg">Click the Blue Shop to open Upgrades</div>

<div id="ui">
    <b style="font-size: 18px;">EchoDupe Tycoon</b><br>
    <span style="color: #44ff44;">$</span><span id="money">0</span><br>
    <small>Workers: <span id="workerCount">0</span></small>
</div>

<div id="shop-gui">
    <h2 style="margin:0 0 10px 0; color: #3399ff;">Town Shop</h2>
    <hr border="1" color="#444">
    <div style="margin-bottom: 15px;">
        <small>Hire a Worker</small>
        <button class="btn" id="buyWorker" onclick="buyWorker()">Buy: $25</button>
    </div>
    <div>
        <small>Money Multiplier (Current: <span id="multText">1.0</span>x)</small>
        <button class="btn" id="buyBoost" onclick="buyBoost()">Buy: $100</button>
    </div>
    <button class="btn" id="close-btn" onclick="closeShop()">Close</button>
</div>

<script>
// --- ENGINE SETUP ---
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 1, 100);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
scene.add(light);
let sun = new THREE.DirectionalLight(0xffffff, 0.5);
sun.position.set(10, 20, 10);
scene.add(sun);

// --- WORLD ASSETS ---
// Ground & Path
let ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({color: 0x2d5a27}));
ground.rotation.x = -Math.PI/2;
scene.add(ground);

let path = new THREE.Mesh(new THREE.PlaneGeometry(8, 200), new THREE.MeshStandardMaterial({color: 0x6d5a44}));
path.rotation.x = -Math.PI/2;
path.position.y = 0.01;
scene.add(path);

// Realistic-ish Shop
function createShop() {
    let shopGroup = new THREE.Group();
    // Walls
    let walls = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 8), new THREE.MeshStandardMaterial({color: 0x3399ff}));
    walls.position.y = 3;
    // Roof
    let roof = new THREE.Mesh(new THREE.ConeGeometry(7, 4, 4), new THREE.MeshStandardMaterial({color: 0x444444}));
    roof.position.y = 8;
    roof.rotation.y = Math.PI/4;
    // Door
    let door = new THREE.Mesh(new THREE.PlaneGeometry(2, 4), new THREE.MeshStandardMaterial({color: 0x222222}));
    door.position.set(0, 2, 4.01);
    
    shopGroup.add(walls, roof, door);
    shopGroup.position.set(0, 0, -20);
    scene.add(shopGroup);
    return shopGroup;
}
let shopBuilding = createShop();

// Trees
let trees = [];
for(let i=0; i<80; i++) {
    let tree = new THREE.Group();
    let t = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 2), new THREE.MeshStandardMaterial({color: 0x4d3319}));
    t.position.y = 1;
    let l = new THREE.Mesh(new THREE.SphereGeometry(1.5, 6, 6), new THREE.MeshStandardMaterial({color: 0x1b4d1b}));
    l.position.y = 2.5;
    tree.add(t, l);
    let rx = (Math.random()-0.5)*120;
    let rz = (Math.random()-0.5)*120;
    if(Math.abs(rx) < 6) rx += 10; 
    tree.position.set(rx, 0, rz);
    scene.add(tree);
    trees.push({obj: tree, x: rx, z: rz});
}

// --- GAME LOGIC ---
let stats = { money: 0, workers: 0, mult: 1, wPrice: 25, bPrice: 100 };
let workerNPCs = [];

function buyWorker() {
    if(stats.money >= stats.wPrice) {
        stats.money -= stats.wPrice;
        stats.workers++;
        stats.wPrice = Math.floor(stats.wPrice * 1.3);
        spawnWorker();
    }
}

function buyBoost() {
    if(stats.money >= stats.bPrice) {
        stats.money -= stats.bPrice;
        stats.mult += 0.5;
        stats.bPrice = Math.floor(stats.bPrice * 2);
    }
}

function spawnWorker() {
    let npc = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 0.8, 4, 8), new THREE.MeshStandardMaterial({color: 0xffff00}));
    npc.position.set(0, 0.8, -15);
    scene.add(npc);
    workerNPCs.push({
        mesh: npc, 
        targetX: (Math.random()-0.5)*20, 
        targetZ: (Math.random()-0.5)*20 - 20 
    });
}

function closeShop() {
    document.getElementById("shop-gui").style.display = "none";
    document.body.requestPointerLock();
}

// --- CONTROLS ---
let player = { x:0, z:10, yaw:0 };
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

document.addEventListener("mousemove", e => {
    if(document.pointerLockElement === document.body) {
        player.yaw -= e.movementX * 0.002;
        camera.rotation.set(0, player.yaw, 0);
    }
});

// Click to Open Shop
document.addEventListener("mousedown", () => {
    let distToShop = Math.sqrt(player.x**2 + (player.z + 20)**2);
    if(distToShop < 8) {
        document.exitPointerLock();
        document.getElementById("shop-gui").style.display = "block";
    } else {
        document.body.requestPointerLock();
    }
});

function update() {
    let speed = 0.15;
    // FIXED: W is Forward, S is Backward
    if(keys["w"]) { player.x -= Math.sin(player.yaw) * speed; player.z -= Math.cos(player.yaw) * speed; }
    if(keys["s"]) { player.x += Math.sin(player.yaw) * speed; player.z += Math.cos(player.yaw) * speed; }
    if(keys["a"]) { player.x -= Math.cos(player.yaw) * speed; player.z += Math.sin(player.yaw) * speed; }
    if(keys["d"]) { player.x += Math.cos(player.yaw) * speed; player.z -= Math.sin(player.yaw) * speed; }

    camera.position.set(player.x, 2.5, player.z);

    // Tree Harvesting
    trees.forEach(tree => {
        let d = Math.sqrt((player.x - tree.x)**2 + (player.z - tree.z)**2);
        if(d < 2) {
            stats.money += 1 * stats.mult;
            tree.obj.position.x = (Math.random()-0.5)*120;
            tree.obj.position.z = (Math.random()-0.5)*120;
            tree.x = tree.obj.position.x; tree.z = tree.obj.position.z;
        }
    });

    // Worker Movement & Logic
    workerNPCs.forEach(npc => {
        let dx = npc.targetX - npc.mesh.position.x;
        let dz = npc.targetZ - npc.mesh.position.z;
        let dist = Math.sqrt(dx*dx + dz*dz);
        
        if(dist > 0.5) {
            npc.mesh.position.x += (dx/dist) * 0.05;
            npc.mesh.position.z += (dz/dist) * 0.05;
        } else {
            npc.targetX = (Math.random()-0.5)*40;
            npc.targetZ = (Math.random()-0.5)*40 - 20;
        }
        stats.money += 0.01 * stats.mult; // Passive income
    });

    // UI Updates
    document.getElementById("money").innerText = Math.floor(stats.money);
    document.getElementById("workerCount").innerText = stats.workers;
    document.getElementById("buyWorker").innerText = "Buy: $" + stats.wPrice;
    document.getElementById("buyBoost").innerText = "Buy: $" + stats.bPrice;
    document.getElementById("multText").innerText = stats.mult.toFixed(1);
    document.getElementById("buyWorker").disabled = stats.money < stats.wPrice;
    document.getElementById("buyBoost").disabled = stats.money < stats.bPrice;
}

function animate() {
    update();
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
