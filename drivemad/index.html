<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>EchoDupe | Drive Mad</title>
    <link rel="icon" type="image/png" href="assets/title.png">
    
    <meta name="robots" content="noindex,nofollow" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    
    <script type="text/javascript" src="Jump_Gamemonetize.js"></script>
    <script src="/js/main.js"></script>
    <meta name="description" content="" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="webapp/fancade.css" />
    <link rel="icon" href="webapp/cover.jpg" />

    <style>
        /* UPDATED HUB BUTTON STYLES */
        #return-terminal {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2147483647 !important;
            background: rgba(15, 15, 20, 0.8);
            border: 1px solid rgba(6, 182, 212, 0.5);
            color: #06b6d4;
            padding: 10px 18px;
            border-radius: 12px;
            font-family: 'Helvetica', Arial, sans-serif;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer !important;
            user-select: none;
            -webkit-appearance: none;
        }
        #return-terminal:hover {
            background: #06b6d4;
            color: #000;
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.6);
            transform: translateY(-2px);
        }
    </style>
  </head>
  <body id="body">
    
    <button id="return-terminal">
        <i class="fa-solid fa-house"></i>
        <span>Back to Hub</span>
    </button>

    <div id="modal_parent">
      <div id="modal_content">
        <span id="modal_close_button">&times;</span>
        <div id="store_link_modal_content" class="modal_inner"></div>
        <div id="share_file_modal_content" class="modal_inner"></div>
      </div>
    </div>
    <div id="canvas_border" class="emscripten_border">
      <div id="play_content" class="middle center">
        <div class="edge">
          <div class="box">
            <div class="black">
              <img src="webapp/cover.jpg" class="cover" />
              <p class="title">Drive Mad</p>
              <p class="author">Martin Magni</p>
            </div>
          </div>
        </div>
        <div id="progress_or_play"><progress id="progress" class="loading" value="0" max="100"></progress></div>
        <p class="description"></p>
      </div>
      <canvas class="emscripten" id="canvas" tabindex="-1"></canvas>
      <div id="gradient"></div>
      <div id="webview_content"></div>
    </div>
    
    <script type="text/javascript" src="webapp/source_min.js"></script>
    <script type="text/javascript" src="webapp/index.js"></script>

    <script type="text/javascript">
        // GLOBAL REDIRECT & TITLE LOCK SCRIPT
        document.addEventListener('DOMContentLoaded', function() {
            // 1. Handle the Hub Button
            var btn = document.getElementById('return-terminal');
            if (btn) {
                btn.addEventListener('click', function(e) {
                    window.location.replace("https://echodupe.github.io/Games/");
                });
            }

            // 2. Force Branding in the Title
            var targetTitle = "EchoDupe | Drive Mad";
            
            var lockTitle = function() {
                if (document.title !== targetTitle) {
                    document.title = targetTitle;
                }
            };

            // Initial lock
            lockTitle();

            // Watch for changes (prevents Fancade/Drive Mad from renaming the tab)
            var observer = new MutationObserver(lockTitle);
            observer.observe(document.querySelector('title'), { childList: true });
        });
    </script>
  </body>
</html>
