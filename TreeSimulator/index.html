<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EchoDupe | Tree Simulator Pro</title>
    <style>
        :root { --neon: #00ffff; --gold: #ffd700; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #87CEEB; color: white; user-select: none; }
        
        #ui {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); padding: 15px 25px; 
            border-radius: 15px; border-left: 5px solid var(--neon); z-index: 10;
            backdrop-filter: blur(8px); pointer-events: none;
        }

        #controls-hint {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; font-size: 0.8em;
        }

        .menu-gui {
            display: none; position: fixed; left: 50%; top: 50%;
            transform: translate(-50%, -50%); width: 350px;
            background: #fff; color: #222; border-radius: 20px;
            padding: 30px; z-index: 2000; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .btn {
            width: 100%; padding: 12px; margin: 8px 0;
            background: #eee; border: none; border-radius: 10px;
            color: #333; cursor: pointer; font-weight: bold; transition: 0.2s;
            display: block; font-size: 1em;
        }
        .btn:hover { background: var(--neon); color: black; }

        #tp-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 20px; background: var(--neon); color: black;
            border-radius: 10px; font-weight: bold; cursor: pointer; z-index: 10;
        }
    </style>
</head>
<body>

<div id="tp-btn" onclick="teleportToShop()">Teleport to Shop [K]</div>

<div id="ui">
    <div style="font-size: 0.7em; letter-spacing: 2px;">BALANCE</div>
    <div style="font-size: 2.2em; font-weight: 900; color: var(--neon);">$<span id="money">0</span></div>
    <div style="font-size: 0.8em;">[E] SHOP | [P] SETTINGS | [SPACE] JUMP</div>
</div>

<div id="controls-hint">WASD to Move | Shift to Sprint | Click to Look</div>

<div id="store-gui" class="menu-gui">
    <h2 style="color:#2e7d32;">VILLAGE SHOP</h2>
    <button class="btn" onclick="buyWorker()">HIRE DRONE ($<span id="w-cost">25</span>)</button>
    <button class="btn" onclick="doRebirth()" style="color: #b8860b;">REBIRTH ($5,000)</button>
    <button class="btn" onclick="closeMenus()" style="background:#333; color:white;">BACK TO GAME</button>
</div>

<div id="settings-gui" class="menu-gui">
    <h2>SETTINGS</h2>
    <button class="btn" onclick="resetGame()" style="color:red;">RESET DATA</button>
    <button class="btn" onclick="closeMenus()" style="background:#333; color:white;">CLOSE</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="game.js"></script>
<script>
    function closeMenus() {
        document.querySelectorAll('.menu-gui').forEach(m => m.style.display = 'none');
        isMenuOpen = false;
        document.body.requestPointerLock();
    }
</script>
</body>
</html>
