<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="x-ua-compatible" content="ie=edge" />
        <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no" />
        <link rel="stylesheet" href="assets/css/app.css" type="text/css" />
        <title>EchoDupe | Basketball Stars</title> <link rel="icon" type="image/png" href="assets/title.png">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">

        <style>
            /* HUB BUTTON CSS */
            #return-terminal {
                position: fixed !important;
                top: 15px !important;
                left: 15px !important;
                z-index: 2147483647 !important;
                background: #000 !important;
                border: 2px solid #06b6d4 !important;
                color: #06b6d4 !important;
                padding: 10px 18px !important;
                border-radius: 10px !important;
                font-family: sans-serif !important;
                font-weight: bold !important;
                text-transform: uppercase !important;
                font-size: 12px !important;
                display: flex !important;
                align-items: center !important;
                gap: 8px !important;
                text-decoration: none !important;
                box-shadow: 0 0 15px rgba(6, 182, 212, 0.5) !important;
                cursor: pointer !important;
            }
            #return-terminal:hover {
                background: #06b6d4 !important;
                color: #000 !important;
            }
        </style>
    </head>
    
    <body>
        <a href="https://echodupe.github.io/Games/" id="return-terminal">
            <i class="fa-solid fa-house"></i>
            <span>Back to Hub</span>
        </a>

        <div id="content"></div>
        <div id="orientation"></div>
        <div id="loader">Loading ...</div>

        <script type="text/javascript" src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
        
        <script type="text/javascript" src="assets/box2dweb/nape.min.js"></script>
        <script type="text/javascript" src="assets/box2dweb/nape-debug-draw.min.js"></script>
        <script type="text/javascript" src="assets/box2dweb/jquery-3.1.1.min.js"></script>
        <script type="text/javascript" src="assets/box2dweb/easeljs-0.8.2.combined.js"></script>
        <script type="text/javascript" src="assets/box2dweb/bluebird.min.js"></script>

        <script type="text/javascript">
            var useEvents = typeof Event === "function";
            var myDispatchEvent = function (name) {
                var event;
                if (useEvents) {
                    event = new Event(name);
                } else {
                    event = document.createEvent("Event");
                    event.initEvent(name, true, true);
                }
                var contentDiv = document.getElementById("content");
                if (contentDiv) contentDiv.dispatchEvent(event);
            };

            window["GD_OPTIONS"] = {
                gameId: "69d78d071f704fa183d75b4114ae40ec",
                onEvent: function (event) {
                    switch (event.name) {
                        case "SDK_GAME_START":
                            myDispatchEvent("SDK_GAME_START");
                            break;
                        case "SDK_GAME_PAUSE":
                            myDispatchEvent("SDK_GAME_PAUSE");
                            break;
                        case "SDK_READY":
                            console.log("SDK_READY");
                            break;
                    }
                },
            };

            (function (d, s, id) {
                var js, fjs = d.getElementsByTagName(s)[0];
                if (d.getElementById(id)) return;
                js = d.createElement(s);
                js.id = id;
                js.src = "assets/main.min.js";
                fjs.parentNode.insertBefore(js, fjs);
            })(document, "script", "gamedistribution-jssdk");
        </script>
        <script type="text/javascript" src="assets/basketball_legends_2019.min.js"></script>
    </body>
</html>
